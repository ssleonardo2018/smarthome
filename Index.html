<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Monitor - Saquarema</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status { font-size: 24px; font-weight: bold; color: #007bff; }
        .label { color: #666; font-size: 14px; }
        .btn-bomba { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #28a745; color: white; font-size: 18px; }
    </style>
</head>
<body>
    <h2>Monitoramento Residencial</h2>
    
    <div class="card">
        <span class="label">Nível da Caixa D'água</span>
        <div class="status">85%</div>
    </div>

    <div class="card">
        <span class="label">Consumo de Energia</span>
        <div class="status">450 W</div>
        <span class="label">Estimativa Mês: R$ 145,00</span>
    </div>

    <div class="card">
        <span class="label">Controle da Bomba</span>
        <button class="btn-bomba">LIGAR AGORA</button>
    </div>
</body>
</html>
